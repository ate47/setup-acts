name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (vX.Y.Z)"
        required: true
        type: string

# required to push branch
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract major version
        id: extract
        run: |
          # version = vX.Y.Z
          ver="${{ github.event.inputs.version }}"
          major="${ver%%.*}"      # "vX"
          echo "major=$major" >> $GITHUB_OUTPUT
      - name: Create or checkout major branch
        run: |
          major="${{ steps.extract.outputs.major }}"
          if git rev-parse --verify "$major" >/dev/null 2>&1; then
            echo "Branch $major exists, checking out"
            git checkout "$major"
          else
            echo "Branch $major does not exist, creating"
            git checkout -b "$major"
          fi
      - name: Merge main into major branch
        run: |
          git merge origin/main --no-edit
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build TypeScript
        run: npx tsc
      - name: Commit compiled JS
        run: |
          git add lib
          git commit -m "Build release ${{ github.event.inputs.version }}" || echo "No changes to commit"
      - name: Push major branch
        run: |
          git push origin "${{ steps.extract.outputs.major }}"
      - name: Create tag
        run: |
          git tag -f "${{ github.event.inputs.version }}"
          git push -f origin "${{ github.event.inputs.version }}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          generate_release_notes: true
